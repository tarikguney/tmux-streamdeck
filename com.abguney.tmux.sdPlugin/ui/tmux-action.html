<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>tmux Action Settings</title>
    <link
      rel="stylesheet"
      href="https://sdpi-components.dev/releases/v3/sdpi-components.css"
    />
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
    <style>
      .hidden {
        display: none;
      }
      .section-header {
        color: #969696;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 12px;
        margin-bottom: 4px;
        padding: 0 16px;
      }
    </style>
  </head>
  <body>
    <sdpi-item label="Multiplexer">
      <sdpi-select setting="multiplexer">
        <option value="tmux">tmux</option>
        <option value="psmux">psmux (Windows)</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Command Method">
      <sdpi-select setting="commandMethod">
        <option value="cli">CLI Command</option>
        <option value="keystroke">Keystroke Simulation</option>
      </sdpi-select>
    </sdpi-item>

    <div class="section-header">CLI Settings</div>

    <sdpi-item label="Custom Command">
      <sdpi-textfield
        setting="customCommand"
        placeholder="Leave empty for default"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Executable Path">
      <sdpi-textfield
        setting="tmuxPath"
        placeholder="Auto-detected (tmux or psmux)"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Socket Path (-S)">
      <sdpi-textfield
        setting="socketPath"
        placeholder="Optional"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item id="targetSessionItem" label="Target Session (-t)">
      <sdpi-textfield
        setting="targetSession"
        placeholder="Auto-detected from ~/.psmux/last_session"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Use WSL (Windows)">
      <sdpi-checkbox setting="useWsl"></sdpi-checkbox>
    </sdpi-item>

    <div class="section-header">Keystroke Settings</div>

    <sdpi-item label="Prefix Key">
      <sdpi-textfield
        setting="prefixKey"
        placeholder="ctrl+b"
      ></sdpi-textfield>
    </sdpi-item>
  </body>
</html>

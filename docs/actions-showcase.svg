<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/><stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="pG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="sG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB74D"/><stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
    <linearGradient id="mG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/><stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="12" fill="url(#bg)"/>
  <rect width="800" height="520" rx="12" fill="none" stroke="#2a2a4a" stroke-width="1"/>

  <!-- ============ WINDOW ACTIONS (Blue) ============ -->
  <circle cx="50" cy="42" r="5" fill="url(#wG)"/>
  <text x="62" y="46" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#4FC3F7">Window Actions</text>

  <!-- New Window -->
  <g transform="translate(40, 60)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(79,195,247,0.15)" stroke="url(#wG)" stroke-width="1.8"/>
      <line x1="10" y1="7.5" x2="10" y2="12.5" stroke="#FFF" stroke-width="2"/>
      <line x1="7.5" y1="10" x2="12.5" y2="10" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">New</text>
  </g>

  <!-- Close Window -->
  <g transform="translate(108, 60)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(79,195,247,0.15)" stroke="url(#wG)" stroke-width="1.8"/>
      <line x1="7.5" y1="7.5" x2="12.5" y2="12.5" stroke="#FFF" stroke-width="2"/>
      <line x1="12.5" y1="7.5" x2="7.5" y2="12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Close</text>
  </g>

  <!-- Next Window -->
  <g transform="translate(176, 60)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(79,195,247,0.15)" stroke="url(#wG)" stroke-width="1.8"/>
      <polyline points="9,7.5 12.5,10 9,12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Next</text>
  </g>

  <!-- Prev Window -->
  <g transform="translate(244, 60)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(79,195,247,0.15)" stroke="url(#wG)" stroke-width="1.8"/>
      <polyline points="11,7.5 7.5,10 11,12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Previous</text>
  </g>

  <!-- Rename Window -->
  <g transform="translate(312, 60)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(79,195,247,0.15)" stroke="url(#wG)" stroke-width="1.8"/>
      <path d="M8.5,12.5 L12,7.5 L13,8.5 L9.5,13.5 L8,13.5 Z" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Rename</text>
  </g>

  <!-- ============ PANE ACTIONS (Green) ============ -->
  <circle cx="50" cy="162" r="5" fill="url(#pG)"/>
  <text x="62" y="166" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#81C784">Pane Actions</text>

  <!-- Split H -->
  <g transform="translate(40, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="10" y1="4.5" x2="10" y2="15.5" stroke="#FFF" stroke-width="1.8" stroke-dasharray="2 1.5"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Split H</text>
  </g>

  <!-- Split V -->
  <g transform="translate(108, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="3.5" y1="10" x2="16.5" y2="10" stroke="#FFF" stroke-width="1.8" stroke-dasharray="2 1.5"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Split V</text>
  </g>

  <!-- Close Pane -->
  <g transform="translate(176, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="10" y1="4" x2="10" y2="16" stroke="url(#pG)" stroke-width="1.5"/>
      <line x1="3" y1="10" x2="10" y2="10" stroke="url(#pG)" stroke-width="1.5"/>
      <line x1="4.5" y1="12" x2="8.5" y2="14.5" stroke="#FFF" stroke-width="2"/>
      <line x1="8.5" y1="12" x2="4.5" y2="14.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Close</text>
  </g>

  <!-- Pane Up -->
  <g transform="translate(244, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="3" y1="10" x2="17" y2="10" stroke="url(#pG)" stroke-width="1.5"/>
      <polyline points="7.5,8.5 10,6 12.5,8.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Up</text>
  </g>

  <!-- Pane Down -->
  <g transform="translate(312, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="3" y1="10" x2="17" y2="10" stroke="url(#pG)" stroke-width="1.5"/>
      <polyline points="7.5,11.5 10,14 12.5,11.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Down</text>
  </g>

  <!-- Pane Left -->
  <g transform="translate(380, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="10" y1="4" x2="10" y2="16" stroke="url(#pG)" stroke-width="1.5"/>
      <polyline points="8.5,7.5 5.5,10 8.5,12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Left</text>
  </g>

  <!-- Pane Right -->
  <g transform="translate(448, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="14" height="12" rx="2" fill="rgba(129,199,132,0.15)" stroke="url(#pG)" stroke-width="1.8"/>
      <line x1="10" y1="4" x2="10" y2="16" stroke="url(#pG)" stroke-width="1.5"/>
      <polyline points="11.5,7.5 14.5,10 11.5,12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Right</text>
  </g>

  <!-- Toggle Zoom -->
  <g transform="translate(516, 180)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="2.5" width="15" height="15" rx="2" fill="rgba(129,199,132,0.1)" stroke="url(#pG)" stroke-width="1.2" stroke-dasharray="2 2"/>
      <polyline points="3,7 3,3 7,3" stroke="#FFF" stroke-width="2"/>
      <line x1="3" y1="3" x2="7.5" y2="7.5" stroke="#FFF" stroke-width="2"/>
      <polyline points="13,3 17,3 17,7" stroke="#FFF" stroke-width="2"/>
      <line x1="17" y1="3" x2="12.5" y2="7.5" stroke="#FFF" stroke-width="2"/>
      <polyline points="3,13 3,17 7,17" stroke="#FFF" stroke-width="2"/>
      <line x1="3" y1="17" x2="7.5" y2="12.5" stroke="#FFF" stroke-width="2"/>
      <polyline points="13,17 17,17 17,13" stroke="#FFF" stroke-width="2"/>
      <line x1="17" y1="17" x2="12.5" y2="12.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Zoom</text>
  </g>

  <!-- ============ SESSION ACTIONS (Orange) ============ -->
  <circle cx="50" cy="282" r="5" fill="url(#sG)"/>
  <text x="62" y="286" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#FFB74D">Session Actions</text>

  <!-- New Session -->
  <g transform="translate(40, 300)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="3" width="13" height="10" rx="2" fill="rgba(255,183,77,0.1)" stroke="url(#sG)" stroke-width="1.5"/>
      <rect x="2" y="6" width="13" height="10" rx="2" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.8"/>
      <line x1="8.5" y1="8.5" x2="8.5" y2="13.5" stroke="#FFF" stroke-width="2"/>
      <line x1="6" y1="11" x2="11" y2="11" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">New</text>
  </g>

  <!-- Detach -->
  <g transform="translate(108, 300)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3,10 L7,10" stroke="url(#sG)" stroke-width="1.8"/>
      <rect x="2" y="8" width="2" height="4" rx="0.5" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.5"/>
      <path d="M13,10 L17,10" stroke="url(#sG)" stroke-width="1.8"/>
      <rect x="16" y="8" width="2" height="4" rx="0.5" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.5"/>
      <path d="M7,7 L9,7 L9,13 L7,13" stroke="#FFF" stroke-width="2"/>
      <path d="M13,7 L11,7 L11,13 L13,13" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Detach</text>
  </g>

  <!-- Switch Session -->
  <g transform="translate(176, 300)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="3" width="13" height="10" rx="2" fill="rgba(255,183,77,0.1)" stroke="url(#sG)" stroke-width="1.5"/>
      <rect x="2" y="6" width="13" height="10" rx="2" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.8"/>
      <polyline points="6,9 8.5,7 8.5,9" stroke="#FFF" stroke-width="2"/>
      <line x1="6" y1="9" x2="11" y2="9" stroke="#FFF" stroke-width="2"/>
      <polyline points="11,13 8.5,15 8.5,13" stroke="#FFF" stroke-width="2"/>
      <line x1="6" y1="13" x2="11" y2="13" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Switch</text>
  </g>

  <!-- Rename Session -->
  <g transform="translate(244, 300)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="3" width="13" height="10" rx="2" fill="rgba(255,183,77,0.1)" stroke="url(#sG)" stroke-width="1.5"/>
      <rect x="2" y="6" width="13" height="10" rx="2" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.8"/>
      <path d="M6.5,14 L10,9 L11,10 L7.5,15 L6,15 Z" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Rename</text>
  </g>

  <!-- Kill Session -->
  <g transform="translate(312, 300)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="3" width="13" height="10" rx="2" fill="rgba(255,183,77,0.1)" stroke="url(#sG)" stroke-width="1.5"/>
      <rect x="2" y="6" width="13" height="10" rx="2" fill="rgba(255,183,77,0.15)" stroke="url(#sG)" stroke-width="1.8"/>
      <line x1="6" y1="9" x2="11" y2="13.5" stroke="#FFF" stroke-width="2"/>
      <line x1="11" y1="9" x2="6" y2="13.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Kill</text>
  </g>

  <!-- ============ MISC ACTIONS (Purple) ============ -->
  <circle cx="50" cy="402" r="5" fill="url(#mG)"/>
  <text x="62" y="406" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#CE93D8">Misc Actions</text>

  <!-- Copy Mode -->
  <g transform="translate(40, 420)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="2" width="11" height="14" rx="2" fill="rgba(206,147,216,0.1)" stroke="url(#mG)" stroke-width="1.5"/>
      <rect x="3" y="4" width="11" height="14" rx="2" fill="rgba(206,147,216,0.15)" stroke="url(#mG)" stroke-width="1.8"/>
      <line x1="6" y1="8" x2="11" y2="8" stroke="#FFF" stroke-width="2"/>
      <line x1="6" y1="11" x2="11" y2="11" stroke="#FFF" stroke-width="2"/>
      <line x1="6" y1="14" x2="9" y2="14" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Copy Mode</text>
  </g>

  <!-- Command Prompt -->
  <g transform="translate(108, 420)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="16" height="12" rx="2" fill="rgba(206,147,216,0.15)" stroke="url(#mG)" stroke-width="1.8"/>
      <polyline points="5,8 8,10 5,12" stroke="#FFF" stroke-width="2"/>
      <line x1="10" y1="12" x2="15" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Cmd Prompt</text>
  </g>

  <!-- Reload Config -->
  <g transform="translate(176, 420)">
    <rect width="52" height="52" rx="9" fill="#16213e" stroke="#2a2a4a"/>
    <g transform="translate(10,10) scale(1.6)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="7" fill="rgba(206,147,216,0.1)" stroke="url(#mG)" stroke-width="1.2" stroke-dasharray="2 2"/>
      <path d="M14.5,5.5 A6,6 0 1,0 16,10" stroke="#FFF" stroke-width="2"/>
      <polyline points="14.5,2.5 14.5,5.5 11.5,5.5" stroke="#FFF" stroke-width="2"/>
    </g>
    <text x="26" y="72" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="8" fill="#555">Reload</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <filter id="termGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
    <filter id="termGlowTight" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <clipPath id="termClip">
      <rect x="100" y="120" width="480" height="370" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="#080812"/>
  <ellipse cx="350" cy="380" rx="600" ry="500" fill="#0a1628" opacity="0.8"/>
  <ellipse cx="1350" cy="480" rx="600" ry="500" fill="#0a1220" opacity="0.6"/>

  <!-- ===== LEFT: Terminal ===== -->
  <rect x="100" y="120" width="480" height="370" rx="24" fill="#2a7a4e" opacity="0.3" filter="url(#termGlow)"/>
  <rect x="100" y="120" width="480" height="370" rx="24" fill="#5ee87d" opacity="0.12" filter="url(#termGlowTight)"/>

  <g clip-path="url(#termClip)">
    <rect x="100" y="120" width="480" height="370" fill="#1a2332"/>
    <rect x="100" y="120" width="480" height="52" fill="#152030"/>
  </g>
  <rect x="100" y="120" width="480" height="370" rx="24" fill="none" stroke="#2a7a4e" stroke-width="3"/>

  <circle cx="132" cy="146" r="8" fill="#e94560"/>
  <circle cx="158" cy="146" r="8" fill="#f5a623"/>
  <circle cx="184" cy="146" r="8" fill="#53d769"/>

  <polyline points="145,230 185,265 145,300" fill="none" stroke="#5ee87d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="205" y1="300" x2="420" y2="300" stroke="#5ee87d" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="205" y1="230" x2="480" y2="230" stroke="#3a6b5a" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="145" y1="350" x2="340" y2="350" stroke="#3a6b5a" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <line x1="145" y1="380" x2="440" y2="380" stroke="#3a6b5a" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- ===== LEFT: Text ===== -->
  <text x="340" y="610" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#ffffff" text-anchor="middle">tmux</text>
  <text x="340" y="700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#ffffff" text-anchor="middle">Shortcuts</text>
  <text x="340" y="770" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" fill="#7a9b8e" text-anchor="middle">21 actions for sessions, windows &amp; panes</text>
  <line x1="240" y1="810" x2="440" y2="810" stroke="#2a7a4e" stroke-width="3" stroke-linecap="round"/>

  <!-- Platform badges -->
  <!-- macOS badge -->
  <rect x="140" y="845" width="175" height="42" rx="21" fill="none" stroke="#5ee87d" stroke-width="2" opacity="0.6"/>
  <text x="228" y="866" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle" dominant-baseline="central">macOS</text>

  <!-- Windows badge -->
  <rect x="335" y="845" width="220" height="42" rx="21" fill="none" stroke="#5ee87d" stroke-width="2" opacity="0.6"/>
  <text x="445" y="866" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle" dominant-baseline="central">Windows (psmux)</text>

  <!-- ===== RIGHT: Stream Deck keys (4x3) ===== -->
  <!-- Key size: 160x160, gap: 16. Cols at x=820,996,1172,1348. Rows at y=160,336,512 -->

  <!-- Row 1 -->
  <rect x="820" y="160" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="996" y="160" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1172" y="160" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1348" y="160" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>

  <!-- Row 2 -->
  <rect x="820" y="336" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="996" y="336" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1172" y="336" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1348" y="336" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>

  <!-- Row 3 -->
  <rect x="820" y="512" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="996" y="512" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1172" y="512" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>
  <rect x="1348" y="512" width="160" height="160" rx="20" fill="#1a2332" stroke="#253545" stroke-width="2.5"/>

  <!-- === Row 1 Icons + Labels === -->

  <!-- New Window -->
  <g transform="translate(900,205)">
    <rect x="-26" y="-16" width="52" height="38" rx="5" fill="none" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="0" y1="-6" x2="0" y2="14" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="-10" y1="4" x2="10" y2="4" stroke="#5ee87d" stroke-width="3.5"/>
  </g>
  <text x="900" y="282" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">New Window</text>

  <!-- Split Horizontal -->
  <g transform="translate(1076,205)">
    <rect x="-26" y="-16" width="52" height="38" rx="5" fill="none" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="0" y1="-16" x2="0" y2="22" stroke="#5ee87d" stroke-width="3.5"/>
  </g>
  <text x="1076" y="282" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Split Horiz</text>

  <!-- Next Window -->
  <g transform="translate(1252,205)">
    <polyline points="-12,-14 12,0 -12,14" fill="none" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1252" y="282" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Next Window</text>

  <!-- Prev Window -->
  <g transform="translate(1428,205)">
    <polyline points="12,-14 -12,0 12,14" fill="none" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1428" y="282" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Prev Window</text>

  <!-- === Row 2 Icons + Labels === -->

  <!-- Toggle Zoom -->
  <g transform="translate(900,381)">
    <rect x="-22" y="-14" width="44" height="32" rx="5" fill="none" stroke="#f5a623" stroke-width="3.5"/>
    <polyline points="-10,10 -10,4 -4,4" fill="none" stroke="#f5a623" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,-6 10,0 4,0" fill="none" stroke="#f5a623" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="900" y="458" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Zoom Pane</text>

  <!-- New Session -->
  <g transform="translate(1076,381)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#5ee87d" stroke-width="3.5"/>
  </g>
  <text x="1076" y="458" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">New Session</text>

  <!-- Detach -->
  <g transform="translate(1252,381)">
    <polyline points="-12,-8 0,6 12,-8" fill="none" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="6" x2="0" y2="-14" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-16" y1="12" x2="16" y2="12" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <text x="1252" y="458" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Detach</text>

  <!-- Close Pane -->
  <g transform="translate(1428,381)">
    <rect x="-20" y="-14" width="40" height="30" rx="4" fill="none" stroke="#e94560" stroke-width="3.5"/>
    <line x1="-8" y1="-5" x2="8" y2="9" stroke="#e94560" stroke-width="3.5"/>
    <line x1="8" y1="-5" x2="-8" y2="9" stroke="#e94560" stroke-width="3.5"/>
  </g>
  <text x="1428" y="458" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Close Pane</text>

  <!-- === Row 3 Icons + Labels === -->

  <!-- Kill Session -->
  <g transform="translate(900,557)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#e94560" stroke-width="3.5"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#e94560" stroke-width="3.5"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#e94560" stroke-width="3.5"/>
  </g>
  <text x="900" y="634" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Kill Session</text>

  <!-- Copy Mode -->
  <g transform="translate(1076,557)">
    <rect x="-14" y="-12" width="22" height="26" rx="3" fill="none" stroke="#5ee87d" stroke-width="3"/>
    <rect x="-6" y="-18" width="22" height="26" rx="3" fill="none" stroke="#5ee87d" stroke-width="3"/>
  </g>
  <text x="1076" y="634" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Copy Mode</text>

  <!-- Reload Config -->
  <g transform="translate(1252,557)">
    <path d="M10,-12 A16,16 0 1,0 16,4" fill="none" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round"/>
    <polyline points="8,4 16,4 16,-5" fill="none" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1252" y="634" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Reload Config</text>

  <!-- Rename Window -->
  <g transform="translate(1428,557)">
    <line x1="-14" y1="12" x2="8" y2="-16" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="8" y1="-16" x2="14" y2="-10" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="14" y1="-10" x2="-8" y2="18" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-16" y1="18" x2="-8" y2="18" stroke="#5ee87d" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <text x="1428" y="634" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Rename Win</text>

  <!-- "& more..." label -->
  <text x="1508" y="760" font-family="system-ui, sans-serif" font-size="24" font-style="italic" fill="#4a6b5e" text-anchor="end">+ 9 more actions</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>
    <clipPath id="termClip">
      <rect x="80" y="200" width="700" height="520" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="#080812"/>
  <ellipse cx="430" cy="480" rx="600" ry="500" fill="#0a1628" opacity="0.7"/>

  <!-- Header -->
  <text x="960" y="90" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Pane Management</text>
  <text x="960" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#7a9b8e" text-anchor="middle">Split, navigate, zoom, and close panes without touching the keyboard</text>

  <!-- Left: Terminal mockup showing split panes -->
  <rect x="80" y="200" width="700" height="520" rx="24" fill="#5ee87d" opacity="0.1" filter="url(#glow)"/>
  <g clip-path="url(#termClip)">
    <rect x="80" y="200" width="700" height="520" fill="#1a2332"/>
    <!-- Title bar -->
    <rect x="80" y="200" width="700" height="40" fill="#152030"/>
    <circle cx="108" cy="220" r="6" fill="#e94560"/>
    <circle cx="128" cy="220" r="6" fill="#f5a623"/>
    <circle cx="148" cy="220" r="6" fill="#53d769"/>

    <!-- Split panes visualization -->
    <!-- Left pane (active) -->
    <rect x="86" y="244" width="340" height="470" fill="#1e2d3d" stroke="#2a7a4e" stroke-width="2"/>
    <!-- Right top pane -->
    <rect x="430" y="244" width="344" height="232" fill="#1a2332" stroke="#253545" stroke-width="1.5"/>
    <!-- Right bottom pane -->
    <rect x="430" y="480" width="344" height="234" fill="#1a2332" stroke="#253545" stroke-width="1.5"/>
  </g>
  <rect x="80" y="200" width="700" height="520" rx="24" fill="none" stroke="#2a7a4e" stroke-width="2.5"/>

  <!-- Pane content -->
  <!-- Left pane -->
  <text x="100" y="275" font-family="monospace" font-size="14" fill="#5ee87d">$ vim app.ts</text>
  <text x="100" y="300" font-family="monospace" font-size="13" fill="#3a6b5a">  1  import express from 'express'</text>
  <text x="100" y="320" font-family="monospace" font-size="13" fill="#3a6b5a">  2  const app = express()</text>
  <text x="100" y="340" font-family="monospace" font-size="13" fill="#f5a623">  3  app.get('/', (req, res) =></text>
  <text x="100" y="360" font-family="monospace" font-size="13" fill="#3a6b5a">  4    res.send('Hello'))</text>

  <!-- Right top pane -->
  <text x="442" y="275" font-family="monospace" font-size="13" fill="#7a9b8e">$ npm run dev</text>
  <text x="442" y="298" font-family="monospace" font-size="12" fill="#3a6b5a">Server running on :3000</text>

  <!-- Right bottom pane -->
  <text x="442" y="510" font-family="monospace" font-size="13" fill="#7a9b8e">$ git status</text>
  <text x="442" y="533" font-family="monospace" font-size="12" fill="#5ee87d">M  src/app.ts</text>

  <!-- Right: Action keys - 2x4 grid -->
  <rect x="920" y="220" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1100" y="220" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1280" y="220" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1460" y="220" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>

  <rect x="920" y="420" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1100" y="420" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1280" y="420" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1460" y="420" width="160" height="160" rx="20" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>

  <!-- Row 1 icons -->
  <!-- Split H -->
  <g transform="translate(1000,270)">
    <rect x="-26" y="-16" width="52" height="38" rx="5" fill="none" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="0" y1="-16" x2="0" y2="22" stroke="#5ee87d" stroke-width="3.5"/>
  </g>
  <text x="1000" y="348" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Split Horiz</text>

  <!-- Split V -->
  <g transform="translate(1180,270)">
    <rect x="-26" y="-16" width="52" height="38" rx="5" fill="none" stroke="#5ee87d" stroke-width="3.5"/>
    <line x1="-26" y1="3" x2="26" y2="3" stroke="#5ee87d" stroke-width="3.5"/>
  </g>
  <text x="1180" y="348" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Split Vert</text>

  <!-- Zoom -->
  <g transform="translate(1360,270)">
    <rect x="-22" y="-14" width="44" height="32" rx="5" fill="none" stroke="#f5a623" stroke-width="3.5"/>
    <polyline points="-10,10 -10,4 -4,4" fill="none" stroke="#f5a623" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,-6 10,0 4,0" fill="none" stroke="#f5a623" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1360" y="348" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Zoom</text>

  <!-- Close Pane -->
  <g transform="translate(1540,270)">
    <rect x="-22" y="-14" width="44" height="32" rx="5" fill="none" stroke="#e94560" stroke-width="3.5"/>
    <line x1="-8" y1="-5" x2="8" y2="9" stroke="#e94560" stroke-width="3.5"/>
    <line x1="8" y1="-5" x2="-8" y2="9" stroke="#e94560" stroke-width="3.5"/>
  </g>
  <text x="1540" y="348" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Close Pane</text>

  <!-- Row 2: Navigation -->
  <!-- Pane Up -->
  <g transform="translate(1000,470)">
    <polyline points="-14,8 0,-10 14,8" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1000" y="548" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Pane Up</text>

  <!-- Pane Down -->
  <g transform="translate(1180,470)">
    <polyline points="-14,-8 0,10 14,-8" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1180" y="548" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Pane Down</text>

  <!-- Pane Left -->
  <g transform="translate(1360,470)">
    <polyline points="8,-14 -10,0 8,14" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1360" y="548" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Pane Left</text>

  <!-- Pane Right -->
  <g transform="translate(1540,470)">
    <polyline points="-8,-14 10,0 -8,14" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1540" y="548" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9ab8aa" text-anchor="middle">Pane Right</text>

  <!-- Description -->
  <text x="1270" y="660" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">Split your workspace and fly between</text>
  <text x="1270" y="690" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">panes with directional navigation.</text>

  <!-- Bottom bar -->
  <rect x="0" y="920" width="1920" height="40" fill="#0f1520"/>
  <text x="960" y="945" font-family="system-ui, sans-serif" font-size="18" fill="#4a6b5e" text-anchor="middle">tmux Shortcuts for Stream Deck  ·  8 pane actions</text>
</svg>

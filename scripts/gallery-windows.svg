<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>
    <clipPath id="termClip">
      <rect x="80" y="200" width="700" height="520" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="#080812"/>
  <ellipse cx="430" cy="480" rx="600" ry="500" fill="#0a1628" opacity="0.7"/>

  <!-- Header -->
  <text x="960" y="90" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Window Management</text>
  <text x="960" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#7a9b8e" text-anchor="middle">Create, navigate, and organize tmux windows from your Stream Deck</text>

  <!-- Left: Terminal mockup showing windows -->
  <rect x="80" y="200" width="700" height="520" rx="24" fill="#5ee87d" opacity="0.1" filter="url(#glow)"/>
  <g clip-path="url(#termClip)">
    <rect x="80" y="200" width="700" height="520" fill="#1a2332"/>
    <!-- Tab bar -->
    <rect x="80" y="200" width="700" height="50" fill="#152030"/>
    <!-- Window tabs -->
    <rect x="90" y="208" width="120" height="34" rx="6" fill="#2a7a4e" opacity="0.5"/>
    <text x="150" y="231" font-family="monospace" font-size="14" fill="#5ee87d" text-anchor="middle">0:main</text>
    <rect x="220" y="208" width="120" height="34" rx="6" fill="#1a2332" stroke="#253545" stroke-width="1"/>
    <text x="280" y="231" font-family="monospace" font-size="14" fill="#7a9b8e" text-anchor="middle">1:server</text>
    <rect x="350" y="208" width="120" height="34" rx="6" fill="#5ee87d" opacity="0.15"/>
    <text x="410" y="231" font-family="monospace" font-size="14" fill="#5ee87d" text-anchor="middle" opacity="0.8">2:logs</text>
    <!-- Blinking new window indicator -->
    <rect x="480" y="208" width="40" height="34" rx="6" fill="none" stroke="#5ee87d" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="500" y="231" font-family="monospace" font-size="18" fill="#5ee87d" text-anchor="middle" opacity="0.5">+</text>
  </g>
  <rect x="80" y="200" width="700" height="520" rx="24" fill="none" stroke="#2a7a4e" stroke-width="2.5"/>

  <!-- Terminal content -->
  <text x="110" y="290" font-family="monospace" font-size="16" fill="#5ee87d">$ tmux list-windows</text>
  <text x="110" y="320" font-family="monospace" font-size="15" fill="#7a9b8e">0: main* (1 panes) [204x50]</text>
  <text x="110" y="345" font-family="monospace" font-size="15" fill="#7a9b8e">1: server  (1 panes) [204x50]</text>
  <text x="110" y="370" font-family="monospace" font-size="15" fill="#7a9b8e">2: logs    (2 panes) [204x50]</text>
  <text x="110" y="420" font-family="monospace" font-size="16" fill="#5ee87d">$</text>
  <rect x="122" y="408" width="10" height="18" fill="#5ee87d" opacity="0.7"/>

  <!-- Right: Action keys -->
  <!-- Key grid: 5 keys in a cross-like layout -->

  <!-- Row of 5 window action keys -->
  <rect x="920" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <g transform="translate(1010,270)">
    <rect x="-30" y="-18" width="60" height="44" rx="6" fill="none" stroke="#5ee87d" stroke-width="4"/>
    <line x1="0" y1="-8" x2="0" y2="16" stroke="#5ee87d" stroke-width="4"/>
    <line x1="-12" y1="4" x2="12" y2="4" stroke="#5ee87d" stroke-width="4"/>
  </g>
  <text x="1010" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#9ab8aa" text-anchor="middle">New Window</text>

  <rect x="1130" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <g transform="translate(1220,270)">
    <rect x="-30" y="-18" width="60" height="44" rx="6" fill="none" stroke="#e94560" stroke-width="4"/>
    <line x1="-12" y1="-5" x2="12" y2="13" stroke="#e94560" stroke-width="4"/>
    <line x1="12" y1="-5" x2="-12" y2="13" stroke="#e94560" stroke-width="4"/>
  </g>
  <text x="1220" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#9ab8aa" text-anchor="middle">Close Window</text>

  <rect x="1340" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <g transform="translate(1430,270)">
    <polyline points="-14,-16 14,0 -14,16" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1430" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#9ab8aa" text-anchor="middle">Next Window</text>

  <rect x="1550" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <g transform="translate(1640,270)">
    <polyline points="14,-16 -14,0 14,16" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1640" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#9ab8aa" text-anchor="middle">Prev Window</text>

  <!-- Second row: Rename -->
  <rect x="920" y="440" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <g transform="translate(1010,490)">
    <line x1="-14" y1="14" x2="8" y2="-16" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="-16" x2="14" y2="-10" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="-10" x2="-8" y2="20" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="20" x2="-8" y2="20" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="1010" y="585" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#9ab8aa" text-anchor="middle">Rename Window</text>

  <!-- Description text -->
  <text x="1340" y="500" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">Instantly create, close, and</text>
  <text x="1340" y="530" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">switch between tmux windows</text>
  <text x="1340" y="570" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">with a single button press.</text>

  <!-- Bottom bar -->
  <rect x="0" y="920" width="1920" height="40" fill="#0f1520"/>
  <text x="960" y="945" font-family="system-ui, sans-serif" font-size="18" fill="#4a6b5e" text-anchor="middle">tmux Shortcuts for Stream Deck  ·  5 window actions</text>
</svg>

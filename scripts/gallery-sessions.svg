<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>
    <clipPath id="termClip">
      <rect x="80" y="200" width="700" height="520" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="#080812"/>
  <ellipse cx="430" cy="480" rx="600" ry="500" fill="#0a1628" opacity="0.7"/>

  <!-- Header -->
  <text x="960" y="90" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Session Management</text>
  <text x="960" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#7a9b8e" text-anchor="middle">Create, switch, and manage tmux sessions with one tap</text>

  <!-- Left: Terminal mockup showing session list -->
  <rect x="80" y="200" width="700" height="520" rx="24" fill="#5ee87d" opacity="0.1" filter="url(#glow)"/>
  <g clip-path="url(#termClip)">
    <rect x="80" y="200" width="700" height="520" fill="#1a2332"/>
    <!-- Title bar -->
    <rect x="80" y="200" width="700" height="40" fill="#152030"/>
    <circle cx="108" cy="220" r="6" fill="#e94560"/>
    <circle cx="128" cy="220" r="6" fill="#f5a623"/>
    <circle cx="148" cy="220" r="6" fill="#53d769"/>
  </g>
  <rect x="80" y="200" width="700" height="520" rx="24" fill="none" stroke="#2a7a4e" stroke-width="2.5"/>

  <!-- Session list content -->
  <text x="110" y="275" font-family="monospace" font-size="16" fill="#5ee87d">$ tmux list-sessions</text>

  <!-- Session entries with visual styling -->
  <rect x="100" y="295" width="660" height="40" rx="6" fill="#2a7a4e" opacity="0.15"/>
  <text x="120" y="321" font-family="monospace" font-size="15" fill="#5ee87d">dev:       3 windows (created Mon Mar 16 09:15) (attached)</text>

  <rect x="100" y="345" width="660" height="40" rx="6" fill="transparent"/>
  <text x="120" y="371" font-family="monospace" font-size="15" fill="#7a9b8e">api:       2 windows (created Mon Mar 16 10:30)</text>

  <rect x="100" y="395" width="660" height="40" rx="6" fill="transparent"/>
  <text x="120" y="421" font-family="monospace" font-size="15" fill="#7a9b8e">deploy:    1 windows (created Mon Mar 16 14:22)</text>

  <rect x="100" y="445" width="660" height="40" rx="6" fill="transparent"/>
  <text x="120" y="471" font-family="monospace" font-size="15" fill="#7a9b8e">monitoring: 4 windows (created Sun Mar 15 08:00)</text>

  <text x="110" y="530" font-family="monospace" font-size="16" fill="#5ee87d">$</text>
  <rect x="122" y="518" width="10" height="18" fill="#5ee87d" opacity="0.7"/>

  <!-- Right: Action keys -->
  <!-- Row 1 -->
  <rect x="920" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1130" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1340" y="220" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>

  <!-- Row 2 -->
  <rect x="920" y="440" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1130" y="440" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>
  <rect x="1340" y="440" width="180" height="180" rx="22" fill="#1a2332" stroke="#2a7a4e" stroke-width="2"/>

  <!-- Row 1 Icons -->
  <!-- New Session -->
  <g transform="translate(1010,275)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#5ee87d" stroke-width="4"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#5ee87d" stroke-width="4"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#5ee87d" stroke-width="4"/>
  </g>
  <text x="1010" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle">New Session</text>

  <!-- Switch Session -->
  <g transform="translate(1220,275)">
    <polyline points="-16,-6 0,-6 0,6 16,6" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,0 16,6 10,12" fill="none" stroke="#5ee87d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1220" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle">Switch Session</text>

  <!-- Detach -->
  <g transform="translate(1430,275)">
    <polyline points="-14,-10 0,6 14,-10" fill="none" stroke="#f5a623" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="6" x2="0" y2="-16" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="-18" y1="14" x2="18" y2="14" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="1430" y="365" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle">Detach</text>

  <!-- Row 2 Icons -->
  <!-- Rename Session -->
  <g transform="translate(1010,495)">
    <line x1="-14" y1="14" x2="8" y2="-16" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="-16" x2="14" y2="-10" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="-10" x2="-8" y2="20" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="20" x2="-8" y2="20" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="1010" y="585" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle">Rename Session</text>

  <!-- Kill Session -->
  <g transform="translate(1220,495)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#e94560" stroke-width="4"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#e94560" stroke-width="4"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#e94560" stroke-width="4"/>
  </g>
  <text x="1220" y="585" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#9ab8aa" text-anchor="middle">Kill Session</text>

  <!-- Description below keys -->
  <text x="1220" y="680" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">Juggle multiple projects with</text>
  <text x="1220" y="710" font-family="system-ui, sans-serif" font-size="22" fill="#7a9b8e" text-anchor="middle">quick session switching.</text>

  <!-- Bottom bar -->
  <rect x="0" y="920" width="1920" height="40" fill="#0f1520"/>
  <text x="960" y="945" font-family="system-ui, sans-serif" font-size="18" fill="#4a6b5e" text-anchor="middle">tmux Shortcuts for Stream Deck  ·  5 session actions  +  copy mode, command prompt, reload config</text>
</svg>

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx @elgato/cli pack com.tarikguney.tmux.sdPlugin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: com.tarikguney.tmux.streamDeckPlugin
          generate_release_notes: true
